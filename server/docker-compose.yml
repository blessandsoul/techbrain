# WARNING: These credentials are for LOCAL DEVELOPMENT ONLY.
# Change all passwords and secrets before using in any shared or production environment.

name: techbrain

services:
  mysql:
    image: mysql:8.0
    container_name: techbrain-mysql
    restart: unless-stopped
    ports:
      - '${MYSQL_PORT:-3430}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: techbrain_db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --character-set-client-handshake=FALSE
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - techbrain-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: techbrain-phpmyadmin
    restart: unless-stopped
    ports:
      - '${PHPMYADMIN_PORT:-8204}:80'
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
      PMA_ARBITRARY: 0
      HIDE_PHP_VERSION: 'true'
    volumes:
      - ./phpmyadmin-config.php:/etc/phpmyadmin/config.user.inc.php
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - techbrain-network

  redis:
    image: redis:7-alpine
    container_name: techbrain-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6503}:6379'
    volumes:
      - redis_data:/data
    networks:
      - techbrain-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: techbrain-redis-commander
    restart: unless-stopped
    ports:
      - '${REDIS_COMMANDER_PORT:-8205}:8081'
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - techbrain-network

volumes:
  mysql_data:
  redis_data:

networks:
  techbrain-network:
    driver: bridge
